<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon Stays - Stay Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Syne:wght@600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --detail-bg: #f2f7ff;
      --detail-card: #ffffff;
      --detail-border: #d7e4f5;
      --detail-ink: #1f2f4a;
      --detail-muted: #6e7f99;
      --detail-blue: #2f6fb2;
      --detail-coral: #ef7b48;
      --detail-font-display: "Syne", "Segoe UI", sans-serif;
      --detail-font-body: "Manrope", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 0%, rgba(110, 164, 240, 0.2), transparent 38%),
        radial-gradient(circle at 85% 0%, rgba(239, 123, 72, 0.14), transparent 30%),
        var(--detail-bg);
      color: var(--detail-ink);
      font-family: var(--detail-font-body);
    }

    .detailPage {
      width: min(1280px, calc(100% - 52px));
      margin: 26px auto 48px;
    }

    .detailBackBtn {
      border: 1px solid var(--detail-border);
      background: #ffffff;
      color: var(--detail-ink);
      border-radius: 999px;
      height: 40px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      cursor: pointer;
    }

    .detailTitle {
      margin: 0;
      font-size: clamp(34px, 4vw, 50px);
      line-height: 1;
      letter-spacing: -0.8px;
      font-family: var(--detail-font-display);
    }

    .detailTitleRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .detailQuickActions {
      display: flex;
      gap: 8px;
    }

    .detailQuickBtn {
      border: 1px solid var(--detail-border);
      background: #fff;
      color: var(--detail-ink);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .detailMeta {
      margin: 0 0 22px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      color: #4f6280;
      font-size: 14px;
      font-weight: 600;
    }

    .dotSep {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #9fb1cc;
      display: inline-block;
    }

    .gallery {
      display: grid;
      grid-template-columns: 2.15fr 1fr 1fr;
      grid-template-rows: 184px 184px;
      gap: 10px;
      margin-bottom: 28px;
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .galleryMain {
      grid-row: span 2;
      border-radius: 18px 0 0 18px;
      overflow: hidden;
    }

    .galleryTile {
      overflow: hidden;
    }

    .galleryTile:nth-child(3) {
      border-radius: 0 18px 0 0;
    }

    .galleryTile:nth-child(5) {
      border-radius: 0 0 18px 0;
    }

    .detailBody {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 350px;
      gap: 28px;
    }

    .leftCol {
      display: grid;
      gap: 28px;
    }

    .section {
      border-top: 1px solid var(--detail-border);
      padding-top: 26px;
    }

    .hostingRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .hostingRow h2 {
      margin: 0;
      font-size: 34px;
      letter-spacing: -0.8px;
      line-height: 1.08;
      font-family: var(--detail-font-display);
    }

    .hostingRow p {
      margin: 8px 0 0;
      color: var(--detail-muted);
    }

    .hostBadge {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #f1f5fc;
    }

    .facts {
      display: grid;
      gap: 16px;
    }

    .factItem {
      display: flex;
      gap: 14px;
    }

    .factIcon {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      border: 1px solid var(--detail-border);
      display: grid;
      place-items: center;
      color: var(--detail-blue);
      font-size: 13px;
      flex-shrink: 0;
    }

    .factItem strong,
    .factItem span {
      display: block;
    }

    .factItem strong {
      font-size: 18px;
      letter-spacing: -0.2px;
    }

    .factItem span {
      color: var(--detail-muted);
    }

    .desc {
      margin: 0;
      color: #3a4f70;
      line-height: 1.72;
      font-size: 16px;
      max-width: 92%;
    }

    .showMore {
      margin-top: 12px;
      border: none;
      background: transparent;
      font-size: 15px;
      font-weight: 700;
      color: var(--detail-ink);
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }

    .amenitiesGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px 24px;
    }

    .amenityItem {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .amenityDot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--detail-blue);
      display: inline-block;
    }

    .reviewsHeader {
      margin: 0 0 16px;
      font-size: 31px;
      line-height: 1.05;
      letter-spacing: -0.5px;
      font-family: var(--detail-font-display);
    }

    .reviewsGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .reviewsMoreBtn {
      margin-top: 16px;
      border: 1px solid #bcd0ea;
      border-radius: 12px;
      background: #ffffff;
      color: #1f2f4a;
      height: 44px;
      padding: 0 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .reviewCard {
      border: 1px solid var(--detail-border);
      border-radius: 14px;
      background: #fff;
      padding: 14px;
    }

    .reviewTop {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .reviewTop img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .reviewTop strong,
    .reviewTop span {
      display: block;
    }

    .reviewTop span {
      font-size: 13px;
      color: var(--detail-muted);
    }

    .reviewText {
      margin: 12px 0 0;
      color: #3e5273;
      line-height: 1.55;
      font-size: 15px;
    }

    .locationMap {
      border: 1px solid var(--detail-border);
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
    }

    .locationMap img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      filter: grayscale(100%) contrast(1.1);
    }

    .locationCaption {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-top: 14px;
    }

    .locationCaption h4 {
      margin: 0;
    }

    .locationCaption p {
      margin: 8px 0 0;
      color: var(--detail-muted);
      line-height: 1.6;
    }

    .bookingCard {
      position: sticky;
      top: 20px;
      border: 1px solid var(--detail-border);
      border-radius: 20px;
      background: #fff;
      padding: 18px;
      height: fit-content;
      box-shadow: 0 16px 28px rgba(30, 56, 97, 0.1);
    }

    .bookingPrice {
      margin: 0;
      font-size: 36px;
      letter-spacing: -0.6px;
      font-family: var(--detail-font-display);
    }

    .bookingPrice span {
      font-size: 17px;
      color: var(--detail-muted);
    }

    .bookingForm {
      margin-top: 14px;
      border: 1px solid var(--detail-border);
      border-radius: 12px;
      overflow: hidden;
    }

    .bookingDates {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .bookingField {
      padding: 10px;
      border-bottom: 1px solid var(--detail-border);
    }

    .bookingField:nth-child(1) {
      border-right: 1px solid var(--detail-border);
    }

    .bookingField small {
      display: block;
      color: #7d8ea8;
      font-size: 10px;
      letter-spacing: 0.4px;
    }

    .bookingField span {
      display: block;
      margin-top: 4px;
      font-size: 14px;
    }

    .bookingGuests {
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .bookingGuests small {
      display: block;
      color: #7d8ea8;
      font-size: 10px;
      letter-spacing: 0.4px;
    }

    .guestCount {
      margin-top: 4px;
      display: block;
      font-size: 14px;
      color: #1f2f4a;
    }

    .guestStepper {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .guestStepper button {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid #b9cce7;
      background: #ffffff;
      color: #1f2f4a;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }

    .guestStepper button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .guestStepper span {
      min-width: 16px;
      text-align: center;
      font-weight: 700;
    }

    .reserveBtn {
      margin-top: 14px;
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(150deg, #f1724c 0%, #ef7b48 45%, #2f6fb2 100%);
      color: #fff;
      font-size: 17px;
      font-weight: 800;
    }

    .subNote {
      margin: 10px 0 0;
      color: var(--detail-muted);
      text-align: center;
      font-size: 13px;
    }

    .priceBreakdown {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .priceRow {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #4b5f7f;
    }

    .priceTotal {
      margin-top: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--detail-border);
      font-weight: 800;
      color: #1f2f4a;
    }

    .priceTip {
      margin-top: 12px;
      border: 1px solid var(--detail-border);
      border-radius: 12px;
      background: #f8fbff;
      padding: 10px;
      color: #597194;
      font-size: 13px;
    }

    @media (max-width: 1060px) {
      .detailBody {
        grid-template-columns: 1fr;
      }

      .bookingCard {
        position: static;
      }
    }

    @media (max-width: 820px) {
      .detailPage {
        width: calc(100% - 24px);
        margin-top: 14px;
      }

      .gallery {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 230px repeat(2, 150px);
      }

      .galleryMain {
        grid-column: span 2;
        grid-row: auto;
        border-radius: 16px 16px 0 0;
      }

      .galleryTile:nth-child(3),
      .galleryTile:nth-child(5) {
        border-radius: 0;
      }

      .reviewsGrid,
      .amenitiesGrid {
        grid-template-columns: 1fr;
      }

      .hostingRow h2,
      .reviewsHeader {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>
  <main class="detailPage" id="detailPage"></main>

  <script>
    const pageNode = document.getElementById("detailPage");
    const params = new URLSearchParams(window.location.search);
    const raw = params.get("data");

    const defaultGallery = [
      "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1400&q=80",
      "https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=900&q=80",
      "https://images.unsplash.com/photo-1512918728675-ed5a9ecdebfd?auto=format&fit=crop&w=900&q=80",
      "https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=900&q=80",
      "https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?auto=format&fit=crop&w=900&q=80"
    ];

    const defaultReviews = [
      {
        name: "Marcus Thorne",
        date: "October 2023",
        text: "Absolutely breathtaking. The pictures don't do justice to the views from the terrace.",
        avatar: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&w=120&q=80"
      },
      {
        name: "Sarah Jenkins",
        date: "September 2023",
        text: "The most relaxing stay I've had. Every detail felt premium but still warm and welcoming.",
        avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=120&q=80"
      }
    ];

    const clean = (value, fallback) => {
      if (value === null || value === undefined || value === "") {
        return fallback;
      }
      return value;
    };

    const formatPrice = (rawPrice) => {
      if (typeof rawPrice !== "string") {
        return "$280/night";
      }
      return rawPrice.includes("/night") ? rawPrice : `${rawPrice}/night`;
    };

    const getGallery = (stay) => {
      const source = [];
      if (Array.isArray(stay.gallery)) {
        source.push(...stay.gallery);
      }
      if (stay.image) {
        source.unshift(stay.image);
      }
      if (stay.coverImage) {
        source.unshift(stay.coverImage);
      }

      const unique = Array.from(new Set(source.filter(Boolean)));
      const full = [...unique, ...defaultGallery];
      return full.slice(0, 5);
    };

    const renderError = (message) => {
      pageNode.innerHTML = `<article style="background:#fff;border:1px solid #d7e4f5;border-radius:14px;padding:18px;color:#1f2f4a;">${message}</article>`;
    };

    if (!raw) {
      renderError("No se encontro informacion del alojamiento.");
    } else {
      try {
        const stay = JSON.parse(decodeURIComponent(raw));
        const title = clean(stay.title, "Horizon Villa");
        const location = clean(stay.location, clean(stay.cityRegion, "Santorini, Greece"));
        const rating = clean(stay.rating, "4.9");
        const maxGuests = clean(stay.maxGuests, "2");
        const maxGuestsNumber = Math.max(Number(maxGuests) || 2, 1);
        const price = formatPrice(clean(stay.price, "$280/night"));
        const description = clean(
          stay.description,
          "Experiencia premium con interiorismo editorial, privacidad y vistas abiertas en una ubicacion privilegiada."
        );
        const amenities = Array.isArray(stay.amenities) && stay.amenities.length > 0
          ? stay.amenities
          : ["Private infinity pool", "High-speed fiber WiFi", "Central climate control", "Panoramic ocean view", "Private chef available", "Free valet parking", "Gourmet kitchen", "Full laundry service"];
        const gallery = getGallery(stay);

        const summaryPrice = Number(String(price).replace(/[^0-9.]/g, "")) || 280;

        const today = new Date();
        const inDateStr = today.toISOString().split('T')[0];
        const outDate = new Date(today);
        outDate.setDate(outDate.getDate() + 5);
        const outDateStr = outDate.toISOString().split('T')[0];
        let nights = 5;
        let total = summaryPrice * nights;

        const hostName = clean(stay.hostName, "Anfitrión");
        const isSuperHost = stay.isSuperHost ?? true;

        pageNode.innerHTML = `
            <header>
              <button class="detailBackBtn" type="button" id="detailBackBtn">← <span>Volver</span></button>
              <div class="detailTitleRow">
                <h1 class="detailTitle">${title}</h1>
                <div class="detailQuickActions">
                  <button class="detailQuickBtn" type="button" id="detailShareBtn">↗ <span id="detailShareLabel">Share</span></button>
                  <button class="detailQuickBtn" type="button">❤ <span>Save</span></button>
                </div>
              </div>
              <p class="detailMeta">
                <span>★ ${rating} · 128 Reviews</span>
                <span class="dotSep"></span>
                <span>${location}</span>
              </p>
            </header>

            <section class="gallery">
              <div class="galleryMain"><img src="${gallery[0]}" alt="Main stay view" /></div>
              <div class="galleryTile"><img src="${gallery[1]}" alt="Gallery image 1" /></div>
              <div class="galleryTile"><img src="${gallery[2]}" alt="Gallery image 2" /></div>
              <div class="galleryTile"><img src="${gallery[3]}" alt="Gallery image 3" /></div>
              <div class="galleryTile"><img src="${gallery[4]}" alt="Gallery image 4" /></div>
            </section>

            <section class="detailBody">
              <div class="leftCol">
                <article>
                  <div class="hostingRow">
                    <div>
                      <h2>Entire villa hosted by ${hostName}</h2>
                      <p>${maxGuests} guests <span class="dotSep"></span> 4 bedrooms <span class="dotSep"></span> 5 beds <span class="dotSep"></span> 4.5 baths</p>
                    </div>
                    <img class="hostBadge" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=120&q=80" alt="Host profile" />
                  </div>
                </article>

                <article class="section facts">
                  ${isSuperHost ? `
                  <div class="factItem">
                    <span class="factIcon">★</span>
                    <div>
                      <strong>${hostName} is a Superhost</strong>
                      <span>Superhosts are experienced, highly rated hosts.</span>
                    </div>
                  </div>
                  ` : ''}
                  <div class="factItem">
                    <span class="factIcon">📍</span>
                    <div>
                      <strong>Great location</strong>
                      <span>100% of recent guests gave the location a 5-star rating.</span>
                    </div>
                  </div>
                  <div class="factItem">
                    <span class="factIcon">✓</span>
                    <div>
                      <strong>Free cancellation for 48 hours</strong>
                      <span>Get a full refund if you change your mind within 48 hours.</span>
                    </div>
                  </div>
                </article>

                <article class="section">
                  <p class="desc">${description}</p>
                  <button class="showMore" type="button">Show more <span>›</span></button>
                </article>

                <article class="section">
                  <h3 class="reviewsHeader">Luxury Amenities</h3>
                  <div class="amenitiesGrid">
                    ${amenities.map((item) => `<span class="amenityItem"><span class="amenityDot"></span><span>${item}</span></span>`).join("")}
                  </div>
                </article>

                <article class="section">
                  <h3 class="reviewsHeader">★ ${rating} · 128 reviews</h3>
                  <div class="reviewsGrid">
                    ${defaultReviews.map((review) => `
                      <article class="reviewCard">
                        <div class="reviewTop">
                          <img src="${review.avatar}" alt="${review.name}" />
                          <div>
                            <strong>${review.name}</strong>
                            <span>${review.date}</span>
                          </div>
                        </div>
                        <p class="reviewText">${review.text}</p>
                      </article>
                    `).join("")}
                  </div>
                  <button class="reviewsMoreBtn" type="button">Ver mas reseñas</button>
                </article>

                <article class="section">
                  <h3 class="reviewsHeader">Where you'll be</h3>
                  <div class="locationMap">
                    <img src="${gallery[0]}" alt="Map area" />
                  </div>
                  <div class="locationCaption">
                    <div>
                      <h4>${location}</h4>
                      <p>The villa is located in one of the most exclusive areas, close to landmarks and quiet scenic routes.</p>
                    </div>
                    <button class="showMore" type="button">More about the location <span>›</span></button>
                  </div>
                </article>
              </div>

              <aside class="bookingCard">
                <h3 class="bookingPrice">$${summaryPrice.toLocaleString()} <span>/ night</span></h3>
                <div class="bookingForm">
                  <div class="bookingDates">
                    <div class="bookingField"><small>CHECK-IN</small><input type="date" id="checkInDate" style="border:none; outline:none; font-family:inherit; font-size:14px; width:100%; color:inherit; background:transparent; padding:0; margin-top:4px; cursor:pointer;" value="${inDateStr}" min="${inDateStr}"/></div>
                    <div class="bookingField"><small>CHECKOUT</small><input type="date" id="checkOutDate" style="border:none; outline:none; font-family:inherit; font-size:14px; width:100%; color:inherit; background:transparent; padding:0; margin-top:4px; cursor:pointer;" value="${outDateStr}" min="${inDateStr}"/></div>
                  </div>
                  <div class="bookingGuests">
                    <div>
                      <small>GUESTS</small>
                      <span class="guestCount" id="guestCountText">2 guests</span>
                    </div>
                    <div class="guestStepper">
                      <button type="button" id="guestMinus" aria-label="Decrease guests">−</button>
                      <span id="guestValue">2</span>
                      <button type="button" id="guestPlus" aria-label="Increase guests">+</button>
                    </div>
                  </div>
                </div>

                <button class="reserveBtn" type="button" id="reserveNowBtn">Reserve Now</button>
                <p class="subNote">You won't be charged yet</p>

                <div class="priceBreakdown" id="priceBreakdownArea">
                  <span class="priceRow"><span>$${summaryPrice} x ${nights} nights</span><span>$${(summaryPrice * nights).toLocaleString()}</span></span>
                  <span class="priceRow priceTotal"><span>Total before taxes</span><span>$${total.toLocaleString()}</span></span>
                </div>

                <p class="priceTip">This is a rare find. Similar listings are usually booked months in advance.</p>
              </aside>
            </section>

          `;

        const backBtn = document.getElementById("detailBackBtn");
        const shareBtn = document.getElementById("detailShareBtn");
        const shareLabel = document.getElementById("detailShareLabel");
        const reserveNowBtn = document.getElementById("reserveNowBtn");
        if (backBtn) {
          backBtn.addEventListener("click", () => {
            if (window.history.length > 1) {
              window.history.back();
            } else {
              window.location.href = "/";
            }
          });
        }

        const setShareStatus = (label) => {
          if (!shareLabel) {
            return;
          }
          shareLabel.textContent = label;
          window.setTimeout(() => {
            shareLabel.textContent = "Share";
          }, 1600);
        };

        shareBtn?.addEventListener("click", async () => {
          const shareUrl = window.location.href;
          const shareData = {
            title,
            text: `${title} · ${location}`,
            url: shareUrl
          };

          try {
            if (navigator.share) {
              await navigator.share(shareData);
              setShareStatus("Shared");
              return;
            }

            if (navigator.clipboard?.writeText) {
              await navigator.clipboard.writeText(shareUrl);
              setShareStatus("Copied");
              return;
            }

            window.prompt("Copy this link:", shareUrl);
            setShareStatus("Ready");
          } catch (error) {
            setShareStatus("Error");
          }
        });

        reserveNowBtn?.addEventListener("click", () => {
          const accessRole = window.localStorage.getItem("staygooAccessRole");
          const hasValidRole = accessRole === "host" || accessRole === "traveler";
          const isSessionActive = window.localStorage.getItem("staygooSession") === "true" && hasValidRole;
          if (!isSessionActive) {
            window.localStorage.removeItem("staygooSession");
            window.localStorage.removeItem("staygooAccessRole");
            const redirectTo = encodeURIComponent(`${window.location.pathname}${window.location.search}`);
            window.location.href = `/login?redirect=${redirectTo}`;
            return;
          }

          const checkInVal = document.getElementById("checkInDate")?.value;
          const checkOutVal = document.getElementById("checkOutDate")?.value;

          const paymentPayload = encodeURIComponent(JSON.stringify({
            title,
            location,
            rating,
            price: `$${summaryPrice.toLocaleString()}/night`,
            guests: guestCount,
            nights,
            total,
            image: gallery[0],
            data: stay,
            checkIn: checkInVal,
            checkOut: checkOutVal
          }));

          window.open(`/payment-process.html?data=${paymentPayload}`, "staygoo-payment-tab", "noopener,noreferrer");
        });

        let guestCount = Math.min(maxGuestsNumber, 2);
        const guestCountText = document.getElementById("guestCountText");
        const guestValue = document.getElementById("guestValue");
        const guestMinus = document.getElementById("guestMinus");
        const guestPlus = document.getElementById("guestPlus");

        const syncGuests = () => {
          if (!guestCountText || !guestValue || !guestMinus || !guestPlus) {
            return;
          }
          guestCountText.textContent = `${guestCount} ${guestCount === 1 ? "guest" : "guests"}`;
          guestValue.textContent = String(guestCount);
          guestMinus.disabled = guestCount <= 1;
          guestPlus.disabled = guestCount >= maxGuestsNumber;
        };

        guestMinus?.addEventListener("click", () => {
          guestCount = Math.max(1, guestCount - 1);
          syncGuests();
        });

        guestPlus?.addEventListener("click", () => {
          guestCount = Math.min(maxGuestsNumber, guestCount + 1);
          syncGuests();
        });

        syncGuests();

        const checkInInput = document.getElementById("checkInDate");
        const checkOutInput = document.getElementById("checkOutDate");
        const priceArea = document.getElementById("priceBreakdownArea");

        const updateNights = () => {
          if (!checkInInput || !checkOutInput || !priceArea) return;
          const inD = new Date(checkInInput.value);
          const outD = new Date(checkOutInput.value);
          if (outD > inD) {
            const diffTime = Math.abs(outD - inD);
            nights = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (nights < 1) nights = 1;
          } else {
            nights = 1;
          }
          total = summaryPrice * nights;
          priceArea.innerHTML = "<span class='priceRow'><span>$" + summaryPrice + " x " + nights + " nights</span><span>$" + (summaryPrice * nights).toLocaleString() + "</span></span>" +
            "<span class='priceRow priceTotal'><span>Total before taxes</span><span>$" + total.toLocaleString() + "</span></span>";
        };

        checkInInput?.addEventListener("change", updateNights);
        checkOutInput?.addEventListener("change", updateNights);

      } catch (error) {
        renderError("No se pudo cargar la informacion del alojamiento.");
      }
    }
  </script>
</body>

</html>
